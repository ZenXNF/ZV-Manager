# ============================================================
#   ZV-Manager - Konfigurasi Tripay Payment Gateway
#   Isi sesuai data dari dashboard: https://tripay.co.id/merchant
# ============================================================

# API Key (dari menu Merchant → Akun → API)
TRIPAY_API_KEY=

# Private Key (dari menu Merchant → Akun → API)
TRIPAY_PRIVATE_KEY=

# Kode Merchant (contoh: T12345)
TRIPAY_MERCHANT_CODE=

# Mode: sandbox = testing | production = live
TRIPAY_MODE=sandbox

# Siapa yang nanggung fee QRIS (~750 + 0.7%):
# 0 = merchant (kamu)
# 1 = customer (user yang topup)
TRIPAY_FEE_CUSTOMER=0

# Nominal preset yang muncul di bot (satuan Rupiah, pisah koma)
# Minimal per transaksi Tripay: 10000
TRIPAY_NOMINAL_PRESET=10000,20000,50000,100000
